version: '3.8'

# Run from the project root:  docker-compose -f infra/docker-compose.yml up -d

services:

  backend:
    build:
      context: ..          # project root — gives access to the BMW dataset file
      dockerfile: infra/Dockerfile.backend
    environment:
      - FLASK_DEBUG=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s    # loading the 39K-row dataset takes a moment

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
